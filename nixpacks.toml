[phases.setup]
nixPkgs = ["nodePackages.npm", "python3", "python3Packages.pip", "gcc", "gnumake", "openssl"]

[phases.install]
cmds = [
    "npm install",
    "python3 -m pip install --upgrade pip",
    "python3 -m pip install --no-cache-dir -r requirements.txt"
]

[phases.build]
cmds = ["npm run build", "python3 -c 'import urllib3; import iqoptionapi; print(\"Python dependencies verified\")'"]

[start]
cmd = "node server.js"
