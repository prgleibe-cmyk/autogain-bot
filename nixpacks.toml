[phases.setup]
nixPkgs = ["nodePackages.npm", "python3", "python3Packages.pip", "gcc", "gnumake", "openssl"]

[phases.install]
cmds = [
    "npm install",
    "python3 -m pip install --upgrade pip",
    "mkdir -p /app/backend/python_lib",
    "python3 -m pip install --no-cache-dir --target /app/backend/python_lib -r requirements.txt"
]

[phases.build]
cmds = [
    "npm run build",
    "ls -la /app/backend/python_lib",
    "PYTHONPATH=/app/backend/python_lib python3 -c 'import urllib3; print(\"Lib Verified\")'"
]

[start]
cmd = "node server.js"
