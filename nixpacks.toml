[phases.setup]
nixPkgs = ["nodePackages.npm", "python3", "python3Packages.pip", "gcc", "gnumake"]

[phases.install]
cmds = [
    "npm install",
    "python3 -m venv /app/.venv",
    "/app/.venv/bin/pip install --upgrade pip",
    "/app/.venv/bin/pip install -r requirements.txt"
]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "PATH=\"/app/.venv/bin:$PATH\" node server.js"
