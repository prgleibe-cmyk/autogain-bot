[phases.setup]
nixPkgs = ["nodePackages.npm", "python3", "python3Packages.pip", "gcc", "gnumake", "openssl"]

[phases.install]
cmds = [
    "npm install",
    "python3 -m pip install --upgrade pip setuptools wheel",
    "mkdir -p ./backend/python_lib",
    "python3 -m pip install --no-cache-dir --target ./backend/python_lib -r requirements.txt"
]

[phases.build]
cmds = [
    "npm run build",
    "ls -R ./backend/python_lib | head -n 20",
    "PYTHONPATH=./backend/python_lib python3 -c 'import urllib3; import iqoptionapi; print(\"Dependencies Verified Successfully\")'"
]

[start]
cmd = "node server.js"
