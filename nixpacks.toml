[phases.setup]
nixPkgs = ["nodePackages.npm", "python3", "python3Packages.pip", "gcc", "gnumake", "openssl"]

[phases.install]
cmds = [
    "npm install",
    "python3 -m venv venv",
    "./venv/bin/pip install --upgrade pip",
    "./venv/bin/pip install --no-cache-dir -r requirements.txt"
]

[phases.build]
cmds = [
    "npm run build",
    "./venv/bin/python3 -c 'import urllib3; print(\"VENV Verified\")'"
]

[start]
cmd = "node server.js"
